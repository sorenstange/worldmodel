experiment_name: worldmodel

data:
  symbols:
    - 'BTCUSDT'
    - 'ETHUSDT'
    - 'SOLUSDT'
    - 'XRPUSDT'
  timeframe: '1m'
  sequence_length: 64
  stride: 32
  window_size: 15
  num_bins: 256
  extreme_value: 0.15
  sigma: 0.8
  normalization_window: 200
  training_interval: 
    - '2018-01-01 00:00'
    - '2025-01-01 00:00'
  validation_interval:
    - '2025-01-01 00:00'
    - '2026-01-01 00:00'
  test_interval:
    - '2026-01-01 00:00'
    - '2026-06-01 00:00'

jepa:
    input_dim: 6 # [Open, High, Low, Close, Volume, Volatility]
    d_model: 2048
    encoder:
      num_layers: 12
      num_heads: 4
      max_len: ${oc.select:data.window_size + 1}
      dropout: 0.1
    predictor:
      num_layers: 14
      num_heads: 4
      max_len: ${$data.sequence_length}
      num_bins: ${$data.num_bins}
      dropout: 0.1
    lam_SIGReg: 0.1
    lam_KLD: 0.4
    lr: 0.001

