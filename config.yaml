experiment_name: worldmodel

data:
  symbols:
    - 'BTCUSDT'
    - 'ETHUSDT'
    - 'SOLUSDT'
    - 'XRPUSDT'
    - 'HYPEUSDT'
    - 'SUIUSDT'
    - 'BNBUSDT'
    - 'ZECUSDT'
    - 'LINKUSDT'
    - 'AAVEUSDT'
    - 'WLDUSDT'
    - 'ONDOUSDT'
    - 'XLMUSDT'
  timeframe: '1m'
  sequence_length: 64
  stride: 32
  window_size: 15
  num_bins: 40
  extreme_value: 0.02
  sigma: 0.2
  normalization_window: 1440
  training_interval: 
    - '2018-01-01 00:00'
    - '2025-01-01 00:00'
  validation_interval:
    - '2025-01-01 00:00'
    - '2026-01-01 00:00'
  test_interval:
    - '2026-01-01 00:00'
    - '2026-06-01 00:00'

jepa:
    input_dim: 6 # [Open, High, Low, Close, Volume, Volatility]
    d_model: 128
    encoder:
      num_layers: 12
      num_heads: 4
      max_len: 16
      dropout: 0.1
    predictor:
      num_layers: 24
      num_heads: 4
      max_len: 64
      num_bins: 128
      dropout: 0.1
    lam_SIGReg: 0.1
    lam_CE: 0.5
    lr: 0.0003
    training:
      epochs: 100
      batch_size: 64
      log_every_n_steps: 10

